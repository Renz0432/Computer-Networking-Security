<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Management Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#ededed] font-sans flex h-screen overflow-hidden">

    <div class="w-64 bg-[#2e2e2e] text-gray-400 flex flex-col justify-between p-6">
        <div>
            <div class="flex items-center gap-3 mb-10 text-white font-bold text-xl">
                <span class="text-green-500">🛡️</span> Security
            </div>
            <nav class="space-y-4">
                <a href="{{ url_for('dashboard') }}" class="flex items-center gap-3 py-2 px-4 rounded transition {{ 'bg-[#4a5343] text-white' if request.path == '/dashboard' }}">
                    📊 Dashboard
                </a>
                <a href="{{ url_for('notifications') }}" class="flex items-center gap-3 py-2 px-4 rounded transition {{ 'bg-[#4a5343] text-white' if request.path == '/notifications' }}">
                    🔔 Notifications
                </a>
                <a href="{{ url_for('admins') }}" class="flex items-center gap-3 py-2 px-4 rounded transition {{ 'bg-[#4a5343] text-white' if request.path == '/admins' }}">
                    👥 Admins
                </a>
            </nav>
        </div>
        <a href="{{ url_for('logout') }}" class="border border-gray-500 text-center py-2 rounded text-sm hover:bg-red-900 transition">
            🚪 Log Out
        </a>
    </div>

    <div class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white p-6 flex justify-between items-center border-b border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800">{% block page_title %}{% endblock %}</h1>
            <div class="bg-[#4a5343] text-white px-4 py-2 rounded flex items-center gap-2 text-sm">
                👤 Admin
            </div>
        </header>
        <main class="p-8 flex-1">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
