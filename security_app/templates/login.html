<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Security Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#41533b] to-[#718c68] h-screen flex items-center justify-center">
    <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl w-96 shadow-2xl border border-white/20 text-white">
        <div class="flex justify-center mb-6">
            <div class="bg-gray-300 w-20 h-20 rounded-full flex items-center justify-center text-3xl">👤</div>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-red-500/80 text-sm p-3 rounded mb-4 text-center">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-4">
                <label class="block text-sm mb-1">Username</label>
                <input type="text" name="username" required class="w-full bg-white/20 border-b border-white/40 px-3 py-2 text-white placeholder-gray-300 focus:outline-none focus:border-white">
            </div>
            <div class="mb-6">
                <label class="block text-sm mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-white/20 border-b border-white/40 px-3 py-2 text-white placeholder-gray-300 focus:outline-none focus:border-white">
            </div>
            <div class="flex items-center justify-between mb-6 text-sm">
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-[#41533b]"> Remember me
                </label>
            </div>
            <button type="submit" class="w-full bg-[#41533b] hover:bg-[#2f3d2a] py-3 rounded-lg font-bold transition shadow-lg">LOGIN</button>
        </form>
    </div>
</body>
</html>
